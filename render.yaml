services:
  - type: web
    name: geotag-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BASE_URL
        value: https://geo-tag-react-native-app.onrender.com